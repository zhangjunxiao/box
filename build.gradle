plugins {
    id 'com.android.application'
}

android {
    namespace 'com.launcher.tvbro'
    compileSdk 28

    defaultConfig {
        applicationId "com.launcher.tvbro"
        minSdk 21
        targetSdk 28
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}